<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">◈</span>
          <span class="logo-text">LEDGER</span>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="summary">
        <div class="summary-card balance">
          <p class="card-label">Total Balance</p>
          <h2 class="card-amount" id="total-balance">$0.00</h2>
        </div>
        <div class="summary-row">
          <div class="summary-card income">
            <p class="card-label">↑ Income</p>
            <h3 class="card-amount" id="total-income">$0.00</h3>
          </div>
          <div class="summary-card expense">
            <p class="card-label">↓ Expenses</p>
            <h3 class="card-amount" id="total-expense">$0.00</h3>
          </div>
        </div>
      </section>

      <section class="form-section">
        <h2 class="section-title">
          <span id="form-title-text">New Transaction</span>
        </h2>
        <form id="transaction-form" novalidate>
          <input type="hidden" id="edit-id" value="" />
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="e.g. Freelance Payment" autocomplete="off" />
            <span class="error-msg" id="title-error">Title cannot be empty.</span>
          </div>
          <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" />
            <span class="error-msg" id="amount-error">Amount must be greater than 0.</span>
          </div>
          <div class="form-group type-group">
            <label>Type</label>
            <div class="type-toggle">
              <button type="button" class="type-btn active" data-type="income">Income</button>
              <button type="button" class="type-btn" data-type="expense">Expense</button>
            </div>
            <input type="hidden" id="type" value="income" />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary" id="submit-btn">Add Transaction</button>
            <button type="button" class="btn-cancel hidden" id="cancel-btn">Cancel</button>
          </div>
        </form>
      </section>

      <section class="list-section">
        <div class="list-header">
          <h2 class="section-title">Transactions</h2>
          <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="income">Income</button>
            <button class="filter-btn" data-filter="expense">Expense</button>
          </div>
        </div>
        <div id="transaction-list">
          <div class="empty-state" id="empty-state">
            <span class="empty-icon">◎</span>
            <p>No transactions yet.</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
